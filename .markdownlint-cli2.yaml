globs:
  - "**/*.md"
  - "!**/node_modules/**"
  - "!**/.claude/**"
  - "!**/.specstory/**"
  - "!**/dist/**"
  - "!**/release/**"
  - "!**/bin/**"
  - "!**/coverage.out"
  - "!**/.task/**"
  - "!**/npm/build/**"
  # e2e harness internal review / coverage artifacts. These are
  # process documents (PoC review findings, scenario inventory)
  # rather than user-facing docs; they intentionally use compact
  # heading/list formatting for grep-ability during review and
  # don't justify the headings-with-blank-lines lint pass.
  - "!**/e2e-v2/REVIEW-FINDINGS.md"
  - "!**/e2e-v2/SCENARIOS-MANIFEST.md"
