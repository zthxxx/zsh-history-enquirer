# Usage: https://taskfile.dev/usage/
# yaml-language-server: $schema=https://taskfile.dev/schema.json
---

version: "3"

set: [pipefail]
shopt: [globstar]

silent: false

vars:
  APP_NAME: zsh-history-enquirer
  BUILD_DIR: bin
  PKG_PATH: github.com/zthxxx/zsh-history-enquirer
  CMD_PATH: ./cmd/zsh-history-enquirer
  # VERSION honours the env override (`VERSION=v2.0.0 task release:dry-run`)
  # before falling back to git describe. Without the env check Task would
  # always resolve VERSION to the current commit hash, even when CI passes
  # an explicit tag — release:dry-run and the publish flow would silently
  # ship the wrong number.
  VERSION:
    sh: '[ -n "${VERSION:-}" ] && printf "%s" "${VERSION}" || (git describe --tags --always --dirty 2>/dev/null || echo "dev")'
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  DATE:
    sh: date -u '+%Y-%m-%dT%H:%M:%SZ'
  LDFLAGS: >-
    -s -w
    -X {{.PKG_PATH}}/pkg/version.version={{.VERSION}}
    -X {{.PKG_PATH}}/pkg/version.commit={{.COMMIT}}
    -X {{.PKG_PATH}}/pkg/version.date={{.DATE}}

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list-all

  # ---------------------------------------------------------------------------
  # Build
  # ---------------------------------------------------------------------------

  build:
    desc: Build the host binary (CGO disabled → fully static)
    env:
      CGO_ENABLED: "0"
    cmds:
      - go build -ldflags "{{.LDFLAGS}}" -o {{.BUILD_DIR}}/{{.APP_NAME}} {{.CMD_PATH}}
    sources:
      - ./**/*.go
      - go.mod
      - go.sum
    generates:
      - "{{.BUILD_DIR}}/{{.APP_NAME}}"

  build:linux:
    desc: Build linux/amd64 binary for e2e tests
    env:
      CGO_ENABLED: "0"
      GOOS: linux
      GOARCH: amd64
    cmds:
      - go build -ldflags "{{.LDFLAGS}}" -o {{.BUILD_DIR}}/{{.APP_NAME}}-linux-amd64 {{.CMD_PATH}}
    sources:
      - ./**/*.go
      - go.mod
      - go.sum
    generates:
      - "{{.BUILD_DIR}}/{{.APP_NAME}}-linux-amd64"

  build:all:
    desc: Cross-compile for all release platforms
    cmds:
      - bash scripts/build-all.sh

  build:release:
    desc: Build release binaries with checksums
    cmds:
      - bash scripts/build-all.sh
      - cd {{.BUILD_DIR}} && (sha256sum {{.APP_NAME}}-* 2>/dev/null || shasum -a 256 {{.APP_NAME}}-*) > checksums.txt

  # ---------------------------------------------------------------------------
  # Run
  # ---------------------------------------------------------------------------

  run:
    desc: Run the application against the user's $HISTFILE (interactive only)
    cmds:
      - go run -ldflags "{{.LDFLAGS}}" {{.CMD_PATH}} {{.CLI_ARGS}}

  # ---------------------------------------------------------------------------
  # Tests
  # ---------------------------------------------------------------------------

  test:
    desc: Run all tests CI runs (unit + e2e)
    cmds:
      - task: test:unit
      - task: test:e2e

  test:unit:
    desc: Run Go unit tests with race detection
    cmds:
      - go test -race -count=1 -coverprofile=coverage.out ./...

  test:property:
    desc: Run property-based tests only
    cmds:
      - go test -race -count=1 -run "TestProperty" ./...

  test:bench:
    desc: Run Go benchmarks for performance characterization
    cmds:
      - go test -bench=. -benchmem -run="^$" ./internal/search/ ./internal/history/ ./internal/ui/

  test:cover:
    desc: Show test coverage in browser
    deps: [test:unit]
    cmds:
      - go tool cover -html=coverage.out -o coverage.html
      - open coverage.html 2>/dev/null || xdg-open coverage.html 2>/dev/null || true

  # ---------------------------------------------------------------------------
  # E2E — docker is the only sanctioned host. The :one-via-act variants
  # exist so a developer can validate the GitHub Actions runner contract
  # locally before pushing.
  # ---------------------------------------------------------------------------

  test:e2e:
    desc: Run all e2e scenarios in docker (debian + alpine)
    deps: [build:linux]
    cmds:
      - for: { var: 'TARGETS', as: TARGET, split: ' ' }
        cmd: TARGET={{.TARGET}} task ci:e2e:run
    vars:
      TARGETS: debian alpine

  test:e2e:one:
    desc: "Run a single e2e target (usage: task test:e2e:one TARGET=debian)"
    deps: [build:linux]
    cmds:
      - TARGET={{.TARGET}} task ci:e2e:run
    requires:
      vars: [TARGET]

  test:e2e:via-act:
    desc: "Run the full CI e2e job under act (usage: task test:e2e:via-act TARGET=debian)"
    cmds:
      - act push --container-architecture linux/amd64 -j e2e --matrix target:{{.TARGET}} --rm
    requires:
      vars: [TARGET]

  # ---------------------------------------------------------------------------
  # Local CI helpers
  # ---------------------------------------------------------------------------

  ci:
    desc: Run full CI pipeline locally via act (lint + test + build + e2e)
    cmds:
      - act push --container-architecture linux/amd64 --rm

  ci:lint:go:
    desc: CI lint — golangci-lint
    cmds:
      - task: lint:go

  ci:lint:md:
    desc: CI lint — markdownlint
    cmds:
      - task: lint:md

  ci:unit:
    desc: CI unit tests with coverage
    cmds:
      - go test -race -count=1 -coverprofile=coverage.out ./...

  ci:build:
    desc: "CI build — single target via GOOS/GOARCH (usage: GOOS=linux GOARCH=amd64 task ci:build)"
    env:
      CGO_ENABLED: "0"
    cmds:
      - go build -ldflags "{{.LDFLAGS}}" -o {{.BUILD_DIR}}/{{.APP_NAME}}-${GOOS}-${GOARCH} {{.CMD_PATH}}

  ci:release:package:
    desc: Flatten download-artifact dist/**/zsh-history-enquirer-* into release/ + checksums.txt
    cmds:
      - mkdir -p release
      - find dist -type f -name '{{.APP_NAME}}-*' -exec cp {} release/ \;
      # The plugin file ships as a separate release asset so the
      # Homebrew formula can install it into share/. Without this,
      # a brew-installed picker has no plugin.zsh on disk and the
      # README's `source $(brew --prefix)/share/zsh-history-enquirer/plugin.zsh`
      # line points at a non-existent path.
      - cp plugin/zsh-history-enquirer.plugin.zsh release/
      # Pass each file by name — globbing `*` would re-include
      # checksums.txt as we write to it, with itself's hash listed
      # against an empty file.
      - cd release && (sha256sum zsh-history-enquirer-* zsh-history-enquirer.plugin.zsh 2>/dev/null || shasum -a 256 zsh-history-enquirer-* zsh-history-enquirer.plugin.zsh) > checksums.txt

  ci:release:bump-homebrew-tap:
    desc: "CI — open a PR bumping zsh-history-enquirer Formula in zthxxx/homebrew-tap (usage: VERSION=v2.0.0 task ci:release:bump-homebrew-tap)"
    cmds:
      - bash scripts/ci/bump-homebrew-tap.sh "{{.VERSION}}"
    requires:
      vars: [VERSION]

  ci:release:publish-npm:
    desc: "CI — render and publish all npm platform packages + the umbrella package (usage: VERSION=v2.0.0 task ci:release:publish-npm)"
    cmds:
      - bash scripts/release/build-npm.sh "{{.VERSION}}" --publish
    requires:
      vars: [VERSION]

  release:dry-run:
    desc: "Dry-run the release pipeline locally (build all platforms, render npm packages, do NOT publish)."
    deps: [build:all]
    cmds:
      - bash scripts/release/build-npm.sh "{{.VERSION}}"
      - echo "==> Inspect npm/build/ for the rendered packages"
      - ls -la npm/build/
    vars:
      VERSION: "{{.VERSION | default \"0.0.0-dryrun\"}}"

  release:smoke:
    desc: "Smoke-test the rendered npm shim — verifies cli.js locates the platform binary, the --print-install-hint path, and the missing-binary fallback."
    deps: [release:dry-run]
    cmds:
      - |
        set -e
        SANDBOX=$(mktemp -d)
        trap "rm -rf '$SANDBOX'" EXIT
        cp -R npm/build/zsh-history-enquirer "$SANDBOX/umbrella"
        # Use the host platform's package.
        HOST_PLATFORM=$(node -p "({darwin: 'darwin', linux: 'linux'}[process.platform] || 'linux') + '-' + ({arm64: 'arm64', x64: 'amd64'}[process.arch] || 'amd64')")
        cp -R "npm/build/${HOST_PLATFORM}" "$SANDBOX/${HOST_PLATFORM}"
        mkdir -p "$SANDBOX/umbrella/node_modules/@zsh-history-enquirer"
        ln -s "$SANDBOX/${HOST_PLATFORM}" "$SANDBOX/umbrella/node_modules/@zsh-history-enquirer/${HOST_PLATFORM}"

        echo "==> Smoke 1/3: shim --version locates platform binary"
        OUT=$(node "$SANDBOX/umbrella/bin/cli.js" --version)
        echo "  shim --version output: $OUT"
        echo "$OUT" | grep -q "zsh-history-enquirer" || (echo "::error::shim did not emit a version line" && exit 1)

        echo "==> Smoke 2/3: --print-install-hint prints the source line"
        HINT_OUT=$(node "$SANDBOX/umbrella/bin/cli.js" --print-install-hint 2>&1)
        echo "$HINT_OUT" | grep -q "Add this line to your ~/.zshrc" \
          || (echo "::error::--print-install-hint did not emit the expected hint" && exit 1)
        echo "$HINT_OUT" | grep -q "plugin/zsh-history-enquirer.plugin.zsh" \
          || (echo "::error::--print-install-hint did not include the plugin path" && exit 1)

        echo "==> Smoke 3/3: missing-binary fallback echoes argv back"
        # Move the platform package out of the way to simulate a
        # broken optionalDependencies resolution (e.g. user on
        # freebsd, or arm32, etc.). The shim must echo argv back so
        # the widget's BUFFER=$(...) does not blank user input.
        rm -rf "$SANDBOX/umbrella/node_modules/@zsh-history-enquirer"
        FALLBACK_OUT=$(node "$SANDBOX/umbrella/bin/cli.js" "git log --pretty=fuller")
        # Stdout must contain the user's typed input verbatim — this
        # is the widget contract enshrined in spec/10.
        [ "$FALLBACK_OUT" = "git log --pretty=fuller" ] \
          || (echo "::error::missing-binary fallback did not echo argv (got: $FALLBACK_OUT)" && exit 1)

        echo "==> all 3 smokes pass"

  ci:e2e:run:
    desc: "CI e2e — build target image and run scenarios (usage: TARGET=debian task ci:e2e:run)"
    cmds:
      - |
        HASH=$(sha256sum e2e/${TARGET}/Dockerfile e2e/run.sh | head -c 12)
        IMAGE="{{.APP_NAME}}-e2e-${TARGET}:${HASH}"
        if ! docker image inspect "$IMAGE" >/dev/null 2>&1; then
          docker build -f e2e/${TARGET}/Dockerfile -t "$IMAGE" e2e
          docker images --format '{{`{{.Repository}}:{{.Tag}}`}}' \
            | grep "^{{.APP_NAME}}-e2e-${TARGET}:" | grep -v ":${HASH}$" \
            | xargs -r docker rmi 2>/dev/null || true
        fi
        docker run --rm \
          -v "$(pwd)/{{.BUILD_DIR}}/{{.APP_NAME}}-linux-amd64:/usr/local/bin/{{.APP_NAME}}:ro" \
          -v "$(pwd)/plugin/{{.APP_NAME}}.plugin.zsh:/opt/{{.APP_NAME}}/plugin.zsh:ro" \
          -v "$(pwd)/e2e/scenarios:/scenarios:ro" \
          -v "$(pwd)/e2e/run.sh:/run.sh:ro" \
          -e TARGET=${TARGET} \
          "$IMAGE" \
          /run.sh
    requires:
      vars: [TARGET]

  # ---------------------------------------------------------------------------
  # Lint / Fmt
  # ---------------------------------------------------------------------------

  lint:
    desc: Run all linters
    cmds:
      - task: lint:go
      - task: lint:arch
      - task: lint:md
      - task: lint:sh

  lint:go:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  lint:go:fix:
    desc: Run golangci-lint with --fix
    cmds:
      - golangci-lint run --fix ./...

  lint:arch:
    desc: Run go-arch-lint to enforce package layering
    cmds:
      # Skip silently if go-arch-lint is missing; otherwise run it
      # and propagate the exit code. Same fix as lint:sh — the
      # single-line `&& ... || (echo ...)` chain previously masked
      # real arch-lint violations by routing them to the 'not
      # installed' message.
      - |
        if ! command -v go-arch-lint >/dev/null; then
          echo "go-arch-lint not installed; skipping (run: task setup)" >&2
          exit 0
        fi
        go-arch-lint check

  lint:sh:
    desc: Run shellcheck on every release / CI shell script
    cmds:
      # Skip silently if shellcheck is missing; otherwise run it and
      # propagate the exit code. The previous `&& ... || (echo ...)`
      # chain masked real shellcheck failures by routing them to the
      # 'not installed' message.
      - |
        if ! command -v shellcheck >/dev/null; then
          echo "shellcheck not installed; skipping" >&2
          exit 0
        fi
        find scripts -name "*.sh" -print0 | xargs -0 shellcheck

  lint:md:
    desc: Run markdownlint via bun (npx fallback if no bun)
    cmds:
      # The `&& bun ... || npx ...` chain handles three cases:
      #   1. bun installed + bun-cached markdownlint-cli2: bun runs.
      #   2. bun installed but no markdownlint-cli2 in cache (fails
      #      with 'Script not found'): || fires, npx runs.
      #   3. bun not installed: command -v fails, || fires, npx runs.
      #
      # Edge case: when bun runs and finds lint violations, it
      # exits non-zero, so npx ALSO runs and finds the same
      # violations — output prints twice. We accept this trade-off
      # because the alternative (`if bun then bun else npx`) breaks
      # case 2 entirely, which is a real and common contributor
      # state on systems where bun is installed but
      # ~/.bun/install/cache hasn't seen markdownlint-cli2.
      - 'command -v bun >/dev/null && bun markdownlint-cli2 "**/*.md" || npx --yes markdownlint-cli2 "**/*.md"'

  fmt:
    desc: Format Go source files
    cmds:
      - gofmt -w .
      - 'command -v goimports >/dev/null && goimports -w -local {{.PKG_PATH}} . || true'

  tidy:
    desc: Tidy Go modules
    cmds:
      - go mod tidy

  check:
    desc: Run all local checks (fmt, lint, all tests including e2e)
    cmds:
      - task: fmt
      - task: lint
      - task: test

  check:fast:
    desc: Run fast local checks (fmt, lint, unit tests only — no docker)
    cmds:
      - task: fmt
      - task: lint
      - task: test:unit

  # ---------------------------------------------------------------------------
  # Setup / clean
  # ---------------------------------------------------------------------------

  clean:
    desc: Clean build artifacts and caches
    cmds:
      - rm -rf {{.BUILD_DIR}} dist release
      - rm -f coverage.out coverage.html
      - rm -rf npm/build npm/packages/@zsh-history-enquirer

  setup:
    desc: Install developer tooling
    cmds:
      # v2.12.2 matches the version pinned in CI (.github/workflows/ci.yml).
      # v2.1.6 was built against Go 1.24 and refuses to load against
      # go.mod's go 1.25.0 directive (forced by go.uber.org/fx@v1.24).
      - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      - go install golang.org/x/tools/cmd/goimports@latest
      - go install github.com/fe3dback/go-arch-lint@latest
      - go install github.com/evilmartians/lefthook/v2@latest
      - lefthook install
      # shellcheck is platform-installed (no go install path). The
      # lint:sh task degrades gracefully if it's missing but CI
      # always has it (apt-get install -y shellcheck in ci.yml).
      - 'command -v shellcheck >/dev/null || echo "(optional) install shellcheck for task lint:sh — brew install shellcheck OR apt-get install shellcheck"'
