name: CI

on:
  push:
    branches:
      # `**` matches multi-segment refs like `refactor/golang/dev`;
      # `*` alone only matches single-segment branches and silently
      # skips slashed branches.
      - "**"
    tags-ignore:
      - "**"
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install golangci-lint via go install
        # The official install.sh's pinned tarball checksum for
        # v2.12.2 doesn't match what GitHub serves (sha256
        # 8df580d2... expected vs fd3a137c... actual). `go install`
        # compiles from source against the host's Go toolchain
        # (1.25 in CI) — both bypasses the broken checksum and
        # guarantees the linter binary is built with a Go version
        # that supports our go.mod target.
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: Install go-arch-lint
        run: go install github.com/fe3dback/go-arch-lint@latest

      - run: task ci:lint:go
      - run: task lint:arch

  lint-markdown:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - run: npx --yes markdownlint-cli2 "**/*.md"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - run: task ci:unit

      - name: Upload coverage
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: task ci:build

      - name: Verify static linkage (linux only)
        if: ${{ matrix.goos == 'linux' }}
        run: |
          file bin/zsh-history-enquirer-${{ matrix.goos }}-${{ matrix.goarch }}
          file bin/zsh-history-enquirer-${{ matrix.goos }}-${{ matrix.goarch }} \
            | grep -v 'dynamically linked'

      - name: Upload binary
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: zsh-history-enquirer-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/zsh-history-enquirer-${{ matrix.goos }}-${{ matrix.goarch }}

  e2e:
    name: E2E (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        target: [debian, alpine]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        if: ${{ env.ACT }}
        with:
          go-version: "1.25"

      - uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download linux/amd64 binary
        if: ${{ !env.ACT }}
        uses: actions/download-artifact@v4
        with:
          name: zsh-history-enquirer-linux-amd64
          path: bin/

      - name: Build linux/amd64 binary (act fallback)
        if: ${{ env.ACT }}
        run: task build:linux

      - name: Make binary executable
        run: chmod +x bin/zsh-history-enquirer-linux-amd64

      - env:
          TARGET: ${{ matrix.target }}
        run: task ci:e2e:run
