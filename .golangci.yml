# https://golangci-lint.run/usage/configuration/
version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

output:
  sort-order:
    - linter
    - severity
    - file

linters:
  enable:
    # bugs
    - govet
    - staticcheck
    - errcheck
    - bodyclose
    - durationcheck
    - nilerr
    - noctx
    - rowserrcheck
    - sqlclosecheck

    # style & convention
    - revive
    - misspell
    - unconvert
    - unparam
    - usestdlibvars
    - whitespace
    - predeclared

    # security
    - gosec

    # performance
    - prealloc

    # code quality
    - gocritic
    - errname
    - errorlint
    - goconst
    - godot
    - makezero
    - nakedret
    - nestif
    - nolintlint
    - tparallel
    - wastedassign

    # modernization
    - intrange
    - copyloopvar

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unreachable-code
        - name: unused-parameter
        - name: var-declaration
        - name: var-naming

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
        - opinionated
      disabled-checks:
        - hugeParam
        - rangeValCopy

    errcheck:
      check-type-assertions: true
      check-blank: true
      # fmt.Print* family is implicitly excluded. Extend the exclusion to
      # writer-bound variants and common UI helpers — these write user-
      # facing text to io.Writer sinks where a write failure has no
      # meaningful recovery path.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (io.Writer).Write
        - (*bytes.Buffer).Write
        - (*bytes.Buffer).WriteString
        - (*strings.Builder).Write
        - (*strings.Builder).WriteString
        - (*strings.Builder).WriteByte
        - (*os.File).Write
        - (*os.File).WriteString

    nestif:
      min-complexity: 6

    nakedret:
      max-func-lines: 30

    goconst:
      min-len: 3
      min-occurrences: 3

    misspell:
      locale: US

    nolintlint:
      require-explanation: true
      require-specific: true

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - goconst
          - gocritic
          - errcheck
          - unparam
          - revive
      # ANSI escape sequences trip misspell on byte literals; permit it.
      - path: 'internal/(ansi|ui)/'
        linters:
          - misspell
      # The TTY package converts os.File.Fd() (uintptr) to int and
      # int32 for syscalls — that is the documented golang.org/x/sys
      # idiom. G115 flags it as "integer overflow" which is a false
      # positive on the platforms we ship.
      - path: 'internal/tty/'
        text: 'G115:'
        linters:
          - gosec
      # Debug log files (ZHE_DEBUG path) are dev-machine only; 0o644
      # is fine for them and keeping them open-by-tail-friendly is
      # the whole point. The path comes from the user's own env var,
      # so G304 / G703 path-traversal warnings are noise.
      - path: 'internal/app/run.go'
        text: 'G302:|G304:|G703:|G104:'
        linters:
          - gosec
      # Subprocess invocation in the history loader uses a fixed
      # binary name ("zsh") with caller-controlled args; this is the
      # documented zsh shell-out and not a vulnerability.
      - path: 'internal/history/loader.go'
        text: 'G204:|G702:'
        linters:
          - gosec
      # `_, _ = io.WriteString(...)` pattern is the documented way to
      # ignore writes to a tty/stderr where there is no recovery. The
      # errcheck "exclude-functions" list above already covers
      # io.Writer.Write but not io.WriteString itself.
      - text: 'WriteString.*is not checked'
        linters:
          - errcheck
      - text: 'a.Stop.*is not checked'
        linters:
          - errcheck
      - text: 'f.Close.*is not checked'
        linters:
          - errcheck
      - text: '`t.LeaveRaw` is not checked'
        linters:
          - errcheck
    paths:
      - vendor

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/zthxxx/zsh-history-enquirer

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
