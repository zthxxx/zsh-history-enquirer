# go-arch-lint config — keeps internal package layering honest.
#
# Layering, top to bottom (each may import what's strictly below):
#
#   cmd      (binary entrypoint)
#     └─ app
#          ├─ history, search, ui, tty, keys
#          │     └─ search, ansi
#          └─ ansi
#
# pkg/ exports primitives and may be imported from anywhere; nothing
# may import cmd/ or internal/app from anywhere else.
#
# https://github.com/fe3dback/go-arch-lint
---
version: 3
workdir: .
allow:
  depOnAnyVendor: true

exclude:
  - vendor

components:
  cmd:
    in: cmd/**
  app:
    in: internal/app/**
  history:
    in: internal/history/**
  search:
    in: internal/search/**
  ui:
    in: internal/ui/**
  tty:
    in: internal/tty/**
  keys:
    in: internal/keys/**
  version:
    in: pkg/version/**

deps:
  cmd:
    mayDependOn: [app, version]
  app:
    # The third-party charmbracelet/x/ansi (which used to be wrapped
    # by internal/ansi) is freely available to every package via
    # `anyVendorDeps: true` — we no longer need an `ansi` component
    # rule because there's no in-repo package to constrain.
    mayDependOn: [history, search, ui, tty, keys, version]
    anyVendorDeps: true
  history:
    anyVendorDeps: true
  search:
    anyVendorDeps: true
  ui:
    # ui depends on keys for the Event types it dispatches on; the
    # logical layering is bytes → events → ui state, even though keys
    # imports tty for its byte source — so the transitive
    # ui→keys→tty edge is intended.
    mayDependOn: [search, keys]
    anyVendorDeps: true
  keys:
    mayDependOn: [tty]
    anyVendorDeps: true
  tty:
    anyVendorDeps: true
  version:
    anyVendorDeps: true
