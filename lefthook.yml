min_version: 1.11.0

pre-commit:
  parallel: true
  commands:
    fmt:
      run: task fmt
      stage_fixed: true
    lint-go:
      run: task lint:go
    lint-arch:
      # Only fires when a .go file is staged — arch violations only
      # surface as import-graph changes, so non-Go commits skip this
      # to keep the hook fast.
      glob: "*.go"
      run: task lint:arch
    lint-sh:
      # Only fires when a .sh file is staged. Hook is no-op without
      # shellcheck installed (see Taskfile.yml lint:sh recipe).
      glob: "*.sh"
      run: task lint:sh
    lint-md:
      glob: "*.md"
      # Fall back to npx if bun isn't on the host. CI uses npx; the
      # `bun markdownlint-cli2` form is just slightly faster when
      # the contributor happens to have bun locally.
      run: command -v bun >/dev/null && bun markdownlint-cli2 {staged_files} || npx --yes markdownlint-cli2 {staged_files}
    test-unit:
      run: task test:unit

commit-msg:
  commands:
    commitlint:
      # Same bun → npx fallback as lint-md. Contributors without bun
      # installed must still get conventional-commit enforcement.
      run: command -v bun >/dev/null && bunx --bun @commitlint/cli --edit {1} || npx --yes @commitlint/cli --edit {1}
