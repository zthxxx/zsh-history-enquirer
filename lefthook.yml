min_version: 1.11.0

pre-commit:
  parallel: true
  commands:
    fmt:
      run: task fmt
      stage_fixed: true
    lint-go:
      run: task lint:go
    lint-md:
      glob: "*.md"
      run: bun markdownlint-cli2 {staged_files}
    test-unit:
      run: task test:unit

commit-msg:
  commands:
    commitlint:
      run: bunx --bun @commitlint/cli --edit {1}
