# https://github.com/DavidAnson/markdownlint/blob/main/schema/.markdownlint.yaml

default: true

# MD003 - Heading style
MD003:
  style: atx

# MD007 - Unordered list indentation
MD007:
  indent: 2

# MD012 - Consecutive blank lines
MD012:
  maximum: 3

# MD013 - Line length
MD013: false

# MD024 - Multiple headings with the same content (allow under different parents)
MD024:
  siblings_only: true

# MD033 - Inline HTML (allowed; README has alignment HTML, kbd, etc.)
MD033: false

# MD041 - First line in file should be a top level heading
MD041: false

# MD046 - Code block style
MD046:
  style: fenced

# MD048 - Code fence style
MD048:
  style: backtick

# MD040 - Fenced code blocks should have a language specified.
# We routinely use unannotated fences for ASCII-art layouts and
# escape-sequence diagrams in spec docs.
MD040: false

# MD038 - Spaces inside code span elements. README quotes commands
# verbatim including the trailing space the user types (e.g. `git log `
# before pressing ^R) — that trailing space is the point.
MD038: false

# MD004 - Unordered list bullet style. Both dashes and asterisks are
# fine; mixing within a single doc is not, but enforcing one across
# the whole repo is more friction than value.
MD004: false
